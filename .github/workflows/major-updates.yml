name: Check major updates

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: docker-workshop-2-angular
            name: Angular app
          - dir: docker-workshop-3-backend
            name: Node backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check for major upgrades
        id: outdated
        working-directory: ${{ matrix.dir }}
        run: |
          MAJORS="[]"
          for pkg in $(jq -r '.dependencies + .devDependencies | keys[]' package.json); do
            CURRENT=$(jq -r "(.dependencies[\"$pkg\"] // .devDependencies[\"$pkg\"])" package.json | sed 's/^[\^~><=]*//' | sed 's/ .*//')
            LATEST=$(npm view "$pkg" dist-tags.latest 2>/dev/null || true)
            if [ -z "$LATEST" ] || [ -z "$CURRENT" ]; then continue; fi
            CUR_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            LAT_MAJOR=$(echo "$LATEST" | cut -d. -f1)
            if [ "$CUR_MAJOR" != "$LAT_MAJOR" ]; then
              MAJORS=$(echo "$MAJORS" | jq -c --arg p "$pkg" --arg c "$CURRENT" --arg l "$LATEST" '. + [{package: $p, current: $c, latest: $l}]')
            fi
          done

          COUNT=$(echo "$MAJORS" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            {
              echo "table<<EOF"
              echo "| Package | Current | Latest |"
              echo "| --- | --- | --- |"
              echo "$MAJORS" | jq -r '.[] | "| \(.package) | \(.current) | \(.latest) |"'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue
        if: steps.outdated.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Major updates available: ${{ matrix.name }}`;
            const body = `## ${{ matrix.name }} (\`${{ matrix.dir }}\`)\n\n` +
              `${{ steps.outdated.outputs.count }} major version upgrade(s) available:\n\n` +
              `${{ steps.outdated.outputs.table }}\n\n` +
              `_Auto-generated on ${new Date().toISOString().split('T')[0]}_`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'major-update',
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['major-update'],
              });
            }

      - name: Close resolved issues
        if: steps.outdated.outputs.count == 0
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Major updates available: ${{ matrix.name }}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'major-update',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
